name: Build Edge Integrated APK

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      upload_artifact:
        description: 'Upload APK as artifact'
        required: true
        default: true
        type: boolean

env:
  JAVA_VERSION: '17'
  ANDROID_SDK_VERSION: '35'
  NDK_VERSION: '27.0.12077973'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ arm64-v8a, armeabi-v7a, x86_64 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-${{ env.ANDROID_SDK_VERSION }}"
          sdkmanager --install "build-tools;${{ env.ANDROID_SDK_VERSION }}.0.0"
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          sdkmanager --install "cmake;3.22.1"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            glslang-tools \
            ninja-build \
            pkg-config \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            xvfb

      - name: Grant execution permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download Termux bootstrap
        run: |
          mkdir -p app/src/main/cpp
          for arch in arm64-v8a armeabi-v7a x86_64 x86; do
            BOOTSTRAP_URL="https://github.com/termux/termux-app/releases/download/v0.118.0/bootstrap-$arch.zip"
            echo "Downloading bootstrap for $arch..."
            curl -fSL --retry 3 -o "app/src/main/cpp/bootstrap-$arch.zip" "$BOOTSTRAP_URL" || \
              echo "Warning: bootstrap for $arch not found"
          done

      - name: Download Winlator assets
        run: |
          mkdir -p winlator-core/src/main/assets
          WINLATOR_ASSETS_URL="https://gitlab.com/winlator3/winlator-extra/-/raw/main"
          for asset in imagefs.txz proton-9.0-arm64ec.txz proton-9.0-x86_64.txz; do
            echo "Downloading $asset..."
            curl -fSL --retry 3 -o "winlator-core/src/main/assets/$asset" \
              "$WINLATOR_ASSETS_URL/$asset" || \
              echo "Warning: $asset download failed"
          done

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build debug APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew :app:assembleRelease \
              -Pandroid.injected.signing.store.file=/dev/null \
              -Pandroid.injected.signing.store.password= \
              -Pandroid.injected.signing.key.alias= \
              -Pandroid.injected.signing.key.password= \
              --no-daemon \
              --stacktrace 2>&1 | tee build.log
          else
            ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          fi
        shell: bash

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.arch }}
          path: build.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Handy-${{ matrix.arch }}-${{ github.event.inputs.build_type || 'debug' }}
          path: |
            app/build/outputs/apk/**/*.apk

  lint:
    name: Lint check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-${{ env.ANDROID_SDK_VERSION }}"
      - run: chmod +x gradlew
      - run: ./gradlew lint --no-daemon --stacktrace 2>&1 | tee build.log
        shell: bash
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: lint-results
          path: |
            app/build/reports/lint-results*.html
            build.log
          retention-days: 7
